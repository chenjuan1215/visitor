
---
layout: default
title: 站点归档
permalink: /archive/
---

<h1>站点所有页面</h1>
<ul>
  {% for page in site.pages %}
    <li>
      <a href="{{ page.url | relative_url }}">{{ page.title | default: page.name }}</a>
    </li>
  {% endfor %}
</ul>

<h1>所有文章</h1>
<ul>
  {% for post in site.posts %}
    <li>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </li>
  {% endfor %}
</ul>
